version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: my_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  minio:
    image: minio/minio:latest
    container_name: my_app_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  minio-setup:
    image: minio/mc:latest
    container_name: my_app_minio_setup
    depends_on:
      - minio
    entrypoint: /bin/sh -c "sleep 5; mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; mc mb myminio/${MINIO_BUCKET_NAME} --ignore-existing; mc anonymous set download myminio/${MINIO_BUCKET_NAME}; echo '✅ Minio bucket created successfully';"
    env_file:
      - .env
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_app_next
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
    networks:
      - app_network
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      NODE_ENV: production

volumes:
  postgres_data:
    name: my_app_postgres_data
  minio_data:
    name: my_app_minio_data

networks:
  app_network:
    name: my_app_network
    driver: bridge